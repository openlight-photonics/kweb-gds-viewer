name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # release.yml handles version tags
  pull_request:

jobs:
  build:
    name: Build & package
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Package VSIX (verify it builds)
        run: npx vsce package --no-dependencies --out kweb-gds-viewer-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-ci
          path: "*.vsix"
          retention-days: 7
