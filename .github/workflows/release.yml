name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - "v*"

# ── One-time admin setup required on gol-eda1 ─────────────────────────────────
# The RPM repo directory must exist and be writable by the runner user (mwilliams).
# Run once as root / sudo on gol-eda1:
#
#   sudo mkdir -p /opt/tools/kweb-gds-viewer-rpms
#   sudo chown mwilliams:"domain users" /opt/tools/kweb-gds-viewer-rpms
#   sudo chmod 755 /opt/tools/kweb-gds-viewer-rpms
#
# ──────────────────────────────────────────────────────────────────────────────

env:
  RPM_REPO_DIR: /opt/tools/kweb-gds-viewer-rpms

jobs:
  release:
    name: Build RPM, publish & deploy
    runs-on: self-hosted
    permissions:
      contents: write   # required to create GitHub Releases
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Extract version from tag ──────────────────────────────────────────
      - name: Set version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.1.0
          VERSION="${TAG#v}"                 # e.g. 1.1.0
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VERSION} from tag ${TAG}"

      # ── 3. Verify package.json version matches tag ────────────────────────────
      - name: Verify version consistency
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [[ "${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "ERROR: package.json version (${PKG_VERSION}) does not match tag (${TAG_VERSION})"
            echo "Update package.json \"version\" field to ${TAG_VERSION} before tagging."
            exit 1
          fi
          echo "Version check passed: ${PKG_VERSION}"

      # ── 4. Install Node dependencies ─────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── 5. Build RPM (calls build-rpm.sh which builds .vsix + downloads PBS + wheels) ──
      - name: Build RPM
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # build-rpm.sh reads VERSION from the spec --define, not package.json,
          # so we temporarily patch it.  The spec already uses %{_version}.
          # build-rpm.sh also picks up the correct package.json version via vsce.
          bash packaging/build-rpm.sh

          RPM_FILE="$(ls packaging/dist/*.rpm | head -1)"
          echo "rpm_file=${RPM_FILE}" >> "$GITHUB_OUTPUT"
          echo "Built: ${RPM_FILE} ($(du -sh "${RPM_FILE}" | cut -f1))"
        id: rpm

      # ── 6. Publish RPM to local dnf repo ─────────────────────────────────────
      - name: Publish to dnf repo
        run: |
          mkdir -p "${RPM_REPO_DIR}"
          bash packaging/make-repo.sh "${RPM_REPO_DIR}"
          echo "RPM repo updated at ${RPM_REPO_DIR}"
          ls -lh "${RPM_REPO_DIR}"/*.rpm

      # ── 7. Create GitHub Release with .vsix + .rpm as assets ─────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          VSIX_FILE="$(ls *.vsix | head -1)"
          RPM_FILE="${{ steps.rpm.outputs.rpm_file }}"

          NOTES_FILE="$(mktemp)"
          {
            echo "## kweb GDS Viewer ${VERSION}"
            echo ""
            echo "### Install on gol-eda1 (admin, once)"
            echo ""
            echo "Download the \`.rpm\` below and run:"
            echo '```bash'
            echo "sudo dnf localinstall kweb-gds-viewer-${VERSION}-1.el8.x86_64.rpm"
            echo '```'
            echo ""
            echo "Or, if the local dnf repo is configured:"
            echo '```bash'
            echo "sudo dnf install kweb-gds-viewer"
            echo '```'
            echo ""
            echo "### Per-user setup (no sudo)"
            echo ""
            echo '```bash'
            echo "/opt/tools/kweb-gds-viewer/install"
            echo '```'
            echo ""
            echo "Then reload Cursor: **Ctrl+Shift+P → Developer: Reload Window**"
            echo ""
            echo "### Manual extension install"
            echo ""
            echo "Download the \`.vsix\` below and run:"
            echo '```bash'
            echo "cursor --install-extension kweb-gds-viewer-${VERSION}.vsix"
            echo '```'
          } > "${NOTES_FILE}"

          gh release create "${TAG}" \
            --title "kweb GDS Viewer ${VERSION}" \
            --notes-file "${NOTES_FILE}" \
            "${VSIX_FILE}" \
            "${RPM_FILE}"

          rm -f "${NOTES_FILE}"
          echo "GitHub Release ${TAG} created."
